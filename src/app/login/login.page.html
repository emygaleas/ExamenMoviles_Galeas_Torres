<ion-content [fullscreen]="true" class="login-content" scroll-y="false">

  <div class="login-bg-grid"></div>
  <div class="login-orb orb-one"></div>
  <div class="login-orb orb-two"></div>

  <div class="login-container">

    <div class="login-panel">

      <div class="game-badge">
        <ion-icon name="game-controller-outline"></ion-icon>
        <span>Game Survey Campus</span>
      </div>

      <div class="logo-section">
        <div class="power-circle">
          <ion-icon name="flash-outline"></ion-icon>
        </div>

        <h1>Inicia Sesión</h1>
        <p>Vuelve al campus gamer y continúa explorando encuestas.</p>
      </div>

      <ion-card class="login-card">
        <ion-card-content>

          <ion-item lines="none" class="custom-item">
            <ion-icon name="mail-outline" slot="start"></ion-icon>

            <ion-input
              type="email"
              placeholder="Correo electrónico"
              [(ngModel)]="email">
            </ion-input>
          </ion-item>

          <ion-item lines="none" class="custom-item">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>

            <ion-input
              type="password"
              placeholder="Contraseña"
              [(ngModel)]="password">
            </ion-input>
          </ion-item>

          <ion-button
            expand="block"
            class="login-main-button"
            (click)="login()">
            Entrar a la app
          </ion-button>

        </ion-card-content>
      </ion-card>

      <div class="register-section">
        <p>¿No tienes una cuenta?</p>

        <ion-button
          fill="clear"
          class="register-button"
          (click)="register()">
          Registrate ahora
        </ion-button>
      </div>

    </div>

  </div>

</ion-content>
